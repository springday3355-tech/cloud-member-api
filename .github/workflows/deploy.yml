name: Deploy to EC2 with Docker

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. GitHub 저장소의 코드를 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. JDK 17 설정
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      # 3. Gradle 빌드 권한 부여 및 빌드 (테스트는 제외)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      # 4. Docker Hub 로그인
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Docker 이미지 빌드 및 Docker Hub에 푸시
      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cloud-member-api:latest

      # 6. EC2에 원격 접속하여 Docker 이미지 pull 받고 실행하기
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            # 옛날에 돌던 도커 컨테이너가 있다면 끄고 삭제합니다.
            sudo docker stop cloud-member-api-container || true
            sudo docker rm cloud-member-api-container || true
            
            # Docker Hub에서 방금 올린 새 이미지를 다운받습니다.
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/cloud-member-api:latest
            
            # 미사용 이미지(안 쓰는 옛날 이미지)를 정리해서 EC2 용량을 확보합니다.
            sudo docker image prune -f
            
            # 8080 포트로 새 도커 컨테이너를 백그라운드에서 실행합니다!
            sudo docker run -d -p 8080:8080 --name cloud-member-api-container ${{ secrets.DOCKERHUB_USERNAME }}/cloud-member-api:latest