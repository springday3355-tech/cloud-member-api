name: Deploy to EC2 with Docker

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. GitHub 저장소의 코드를 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. JDK 17 설정
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      # 3. Gradle 빌드 권한 부여 및 빌드 (테스트는 제외)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      # 4. Docker Hub 로그인
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Docker 이미지 빌드 및 Docker Hub에 푸시
      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cloud-member-api:latest
          platforms: linux/arm64

      # 6. EC2에 원격 접속하여 Docker 이미지 pull 받고 실행하기
      - name: Deploy to EC2 via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ec2-user@${{ secrets.EC2_HOST }} "
            sudo docker stop cloud-member-api-container || true
            sudo docker rm cloud-member-api-container || true
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/cloud-member-api:latest
            sudo docker image prune -f
            sudo docker run -d -p 8080:8080 --name cloud-member-api-container ${{ secrets.DOCKERHUB_USERNAME }}/cloud-member-api:latest
          "